<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emergency Mooring Board</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root{--ink:#14213d;--muted:#5b677a;--line:#d9e1ec;--panel:#fff;--bg:#f8fafc;--navy:#111827;--green:#22c55e;--red:#ef4444;--orange:#f97316;--blue:#2563eb}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif;font-size:14px}.wrap{max-width:1120px;margin:0 auto;padding:34px 22px 60px}h1{text-align:center;font-size:42px;line-height:1;margin:0 0 8px;color:#020617}h2,h3,h4{margin:0 0 14px}.top-refresh{display:block;margin:0 auto 26px;padding:4px 14px;font-size:11px;border:1px solid #b9c6d6;background:#fff;border-radius:4px;cursor:pointer}.stats{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 24px rgba(15,23,42,.06)}.stat{height:132px;display:flex;align-items:center;padding:24px}.stat.available{border-color:#bbf7d0}.stat.occupied{border-color:#fecaca}.icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:25px;margin-right:24px}.available .icon{background:#ccfbf1;color:#0891b2}.occupied .icon{background:#ffe4e6;color:#e11d48}.stat-label{font-size:12px;color:#334155;margin-bottom:4px}.stat-num{font-size:34px;font-weight:800;color:#0f172a}.stat-sub{font-size:11px;color:#64748b;margin-top:4px}.nearest{padding:22px;text-align:center;margin-bottom:22px}.nearest h3{font-size:18px}.btn{border:1px solid #cbd5e1;background:#fff;color:#0f172a;border-radius:8px;padding:10px 14px;font-weight:800;cursor:pointer}.btn.small{font-size:12px;padding:8px 12px}.btn.primary{background:#0f172a;border-color:#0f172a;color:#fff}.btn.blue{background:#2563eb;border-color:#2563eb;color:#fff}.btn.red{background:#ef4444;border-color:#ef4444;color:#fff}.btn.green{background:#22c55e;border-color:#22c55e;color:#fff}.btn.danger{border-color:#fca5a5;color:#b91c1c}.hint{color:#64748b;font-size:13px;line-height:1.45}.nearest-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.nearest-item{text-align:left;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px;cursor:pointer}.nearest-item:first-child{background:#eff6ff}.content{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:20px}.left-stack{display:grid;gap:20px}#map{height:620px;border-radius:18px;border:1px solid var(--line);overflow:hidden;background:#dbeafe}.list-card{padding:18px;max-height:410px;overflow:auto}.list-title{text-align:center;font-size:18px;font-weight:800;margin-bottom:14px}.list{display:grid;gap:8px}.item{width:100%;text-align:left;border:1px solid #cfd8e3;background:#fff;border-radius:9px;padding:12px;cursor:pointer;color:#111827}.item.selected{background:#111827;color:#fff}.item-title{font-weight:900;font-size:13px}.item-meta{font-size:11px;line-height:1.35;color:#334155}.selected .item-meta{color:#d1d5db}.detail{padding:28px 22px;min-height:620px}.detail h2{text-align:center;font-size:29px;color:#475569;line-height:1.15}.detail-center{text-align:center}.actions{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:18px 0 24px}.form label{display:block;text-align:center;font-size:13px;font-weight:800;margin:12px 0 7px}.form input,.form select,.form textarea{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:10px;background:#fff;font-size:13px}.form textarea{min-height:86px;resize:vertical}.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.photo{border:1px solid var(--line);border-radius:10px;overflow:hidden}.photo img{display:block;width:100%;height:120px;object-fit:cover}.photo-body{padding:8px}.history-box{border:1px solid var(--line);border-radius:10px;padding:12px;display:flex;align-items:center;justify-content:space-between;gap:10px}.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.56);display:none;align-items:center;justify-content:center;z-index:4000;padding:22px}.modal{background:#fff;border-radius:18px;max-width:560px;width:100%;max-height:80vh;overflow:auto;padding:20px}.modal-head{display:flex;justify-content:space-between;align-items:center}.x{width:34px;height:34px;border-radius:999px;padding:0}.history-item{border-bottom:1px solid var(--line);padding:10px 0}.history-item:last-child{border-bottom:0}.marker-dot{width:18px;height:18px;border-radius:999px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35)}.marker-dot.highlight{width:24px;height:24px;border:3px solid #fb923c}.user-dot{width:18px;height:18px;border-radius:999px;background:#2563eb;border:3px solid #fff;box-shadow:0 0 0 5px rgba(37,99,235,.25),0 2px 8px rgba(0,0,0,.35)}
    @media(max-width:900px){.wrap{padding:24px 14px}h1{font-size:32px}.stats,.content{grid-template-columns:1fr}.stat{height:auto}.nearest-list{grid-template-columns:1fr}#map{height:430px}.detail{min-height:0}.photo-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Emergency Mooring Board</h1><button id="refreshTop" class="top-refresh">Refresh Moorings</button>
    <section class="stats"><div class="card stat available"><div class="icon">⚓</div><div><div class="stat-label">Available Moorings:</div><div id="availableCount" class="stat-num">0</div><div id="availableSub" class="stat-sub">Out of 0 total moorings</div></div></div><div class="card stat occupied"><div class="icon">⛔</div><div><div class="stat-label">Occupied Moorings:</div><div id="occupiedCount" class="stat-num">0</div><div class="stat-sub">Currently attached / in use</div></div></div></section>
    <section class="card nearest"><h3>Nearest Available Moorings</h3><button id="locateBtn" class="btn blue small">Use my current location</button><div id="locationMsg" class="hint" style="margin-top:14px">Allow location access to see the 3 nearest available moorings.</div><div id="nearestList" class="nearest-list"></div></section>
    <section class="content"><div class="left-stack"><div id="map" class="card"></div><div class="card list-card"><div class="list-title">Mooring List</div><div id="listStatus" class="hint">Loading...</div><div id="mooringList" class="list"></div></div></div><aside id="detail" class="card detail"><p class="hint detail-center">Select a mooring to view details.</p></aside></section>
  </div>
  <div id="historyModal" class="modal-bg"><div class="modal"><div class="modal-head"><h3>History</h3><button id="closeHistory" class="btn x">×</button></div><p id="historySub" class="hint"></p><div id="historyList"></div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const SUPABASE_URL="https://hjrcnsuzrztaiwnttxnr.supabase.co";
    const SUPABASE_ANON_KEY="sb_publishable_8vscwHQ7y50eUj-RywvmLQ_JGpSp2HE";
    const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    const s={pins:[],photos:[],logs:[],selected:"",user:null,nearest:[],map:null,markers:null,userMarkers:null,loading:false};
    const $=id=>document.getElementById(id);
    const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    const num=v=>{const n=Number(v);return Number.isFinite(n)?n:null}; const fixed=(v,d=5)=>num(v)===null?"-":num(v).toFixed(d); const dt=v=>v?new Date(v).toLocaleString():"-";
    function dm(v,isLat=true){const n=num(v);if(n===null)return"-";const a=Math.abs(n),deg=Math.floor(a),min=((a-deg)*60).toFixed(3),dir=isLat?(n>=0?"N":"S"):(n>=0?"E":"W");return `${deg}° ${min}' ${dir}`}
    function rad(d){return d*Math.PI/180} function dist(a,b,c,d){const R=6371,x=rad(c-a),y=rad(d-b),q=Math.sin(x/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(q),Math.sqrt(1-q))}
    const pin=()=>s.pins.find(p=>p.id===s.selected)||null; const pinPhotos=()=>s.photos.filter(p=>p.pin_id===s.selected); const pinLogs=()=>s.logs.filter(l=>l.pin_id===s.selected).slice(0,10);
    function initMap(){s.map=L.map("map").setView([-36.85,174.76],10);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap contributors"}).addTo(s.map);s.markers=L.layerGroup().addTo(s.map);s.userMarkers=L.layerGroup().addTo(s.map)}
    function color(p){return p.status==="occupied"?"#dc2626":(p.availability_class||"normal")==="orange"?"#f97316":"#16a34a"}
    function icon(p,hi){return L.divIcon({className:"",html:`<div class="marker-dot ${hi?"highlight":""}" style="background:${color(p)}"></div>`,iconSize:hi?[24,24]:[18,18],iconAnchor:hi?[12,12]:[9,9]})}
    function userIcon(){return L.divIcon({className:"",html:`<div class="user-dot"></div>`,iconSize:[18,18],iconAnchor:[9,9]})}
    function renderMap(){if(!s.map)return;s.markers.clearLayers();s.userMarkers.clearLayers();const hi=s.nearest.map(p=>p.id);s.pins.filter(p=>p.lat!=null&&p.lng!=null).forEach(p=>{const m=L.marker([Number(p.lat),Number(p.lng)],{icon:icon(p,hi.includes(p.id)||s.selected===p.id)}).bindPopup(`<b>${esc(p.mooring_code||"NO-CODE")} - ${esc(p.title||"Untitled")}</b><br>Status: ${esc(p.status||"-")}<br>Availability class: ${esc(p.availability_class||"normal")}${p.current_vessel_name?`<br>Vessel: ${esc(p.current_vessel_name)}`:""}`);m.on("click",()=>selectPin(p.id));m.addTo(s.markers)});if(s.user)L.marker([s.user.lat,s.user.lng],{icon:userIcon()}).bindPopup("My current location").addTo(s.userMarkers)}
    function computeNearest(){s.nearest=s.user?s.pins.filter(p=>p.status==="available"&&p.lat!=null&&p.lng!=null).map(p=>({...p,distanceKm:dist(s.user.lat,s.user.lng,Number(p.lat),Number(p.lng))})).sort((a,b)=>a.distanceKm-b.distanceKm).slice(0,3):[]}
    function renderSummary(){const av=s.pins.filter(p=>p.status==="available").length,oc=s.pins.filter(p=>p.status==="occupied").length;$("availableCount").textContent=av;$("occupiedCount").textContent=oc;$("availableSub").textContent=`Out of ${s.pins.length} total moorings`}
    function renderList(){if(s.loading){$("listStatus").textContent="Loading...";$("mooringList").innerHTML="";return} if(!s.pins.length){$("listStatus").textContent="No moorings found.";$("mooringList").innerHTML="";return} $("listStatus").textContent="";$("mooringList").innerHTML=s.pins.map(p=>`<button class="item ${p.id===s.selected?"selected":""}" data-id="${esc(p.id)}"><div class="item-title">${esc(p.mooring_code||"NO-CODE")} - ${esc(p.title||"Untitled")}</div><div class="item-meta">Status: ${esc(p.status||"-")}<br>Availability class: ${esc(p.availability_class||"normal")}<br>${p.current_vessel_name?`Vessel: ${esc(p.current_vessel_name)}`:"No vessel attached"}</div></button>`).join("");document.querySelectorAll(".item").forEach(b=>b.onclick=()=>selectPin(b.dataset.id))}
    function renderNearest(){if(!s.user){$("nearestList").innerHTML="";return} if(!s.nearest.length){$("nearestList").innerHTML="";$("locationMsg").textContent="There are currently no available moorings.";return} $("locationMsg").textContent="Nearest available moorings based on current device location.";$("nearestList").innerHTML=s.nearest.map((p,i)=>`<button class="nearest-item" data-id="${esc(p.id)}"><b>${i+1}. ${esc(p.mooring_code||"NO-CODE")} - ${esc(p.title||"Untitled")}</b><br><span class="hint">${p.distanceKm.toFixed(2)} km away</span></button>`).join("");document.querySelectorAll(".nearest-item").forEach(b=>b.onclick=()=>selectPin(b.dataset.id))}
    function renderDetail(){const p=pin();if(!p){$("detail").innerHTML='<p class="hint detail-center">Select a mooring to view details.</p>';return} const photos=pinPhotos(),logs=pinLogs();const isOcc=p.status==="occupied";const currentVessel=isOcc?(p.current_vessel_name||""):"";const currentNote=isOcc?(p.note||""):"";const vesselLine=isOcc?`<br><b>Current vessel:</b> ${esc(currentVessel||"-")}`:"";$("detail").innerHTML=`<h2>${esc(p.mooring_code||"NO-CODE")} - ${esc(p.title||"Untitled")}</h2><div class="detail-center hint">lat ${fixed(p.lat)} / lng ${fixed(p.lng)}<br>${dm(p.lat,true)} / ${dm(p.lng,false)}<br><br><b>Status:</b> ${esc(p.status||"-")}<br><b>Availability class:</b> ${esc(p.availability_class||"normal")}${vesselLine}<br><b>Last updated:</b> ${dt(p.last_updated_at)}</div><div class="actions"><button id="occ" class="btn red small">Mark Occupied</button><button id="ava" class="btn green small">Mark Available</button><button id="ref" class="btn small">Refresh Moorings</button></div><div class="form"><h4 class="detail-center">Detailed Update</h4><label>Status</label><select id="editStatus"><option value="">Select status</option><option value="available" ${p.status==="available"?"selected":""}>available</option><option value="occupied" ${p.status==="occupied"?"selected":""}>occupied</option></select><label>Current Vessel Name</label><input id="vessel" value="${esc(currentVessel)}"><label>Note</label><textarea id="note">${esc(currentNote)}</textarea><button id="save" class="btn primary" style="width:100%;margin-top:12px">Save Detailed Update</button></div><hr style="border:0;border-top:1px solid var(--line);margin:28px 0"><h4 class="detail-center">Photos</h4><div class="detail-center"><input id="photoInput" type="file" accept="image/*" style="display:none"><button id="uploadBtn" class="btn">Upload Photo</button><div id="uploadMsg" class="hint" style="margin-top:8px"></div></div>${photos.length?`<div class="photo-grid">${photos.map(ph=>`<div class="photo"><img src="${esc(ph.file_path)}" alt="Mooring"><div class="photo-body"><div class="hint">${dt(ph.created_at)}</div><button class="btn danger small del" data-id="${esc(ph.id)}">Delete</button></div></div>`).join("")}</div>`:'<p class="hint detail-center">No photos uploaded yet.</p>'}<hr style="border:0;border-top:1px solid var(--line);margin:28px 0"><h4 class="detail-center">Status History</h4>${logs.length?`<div class="history-box"><div><small>Latest update</small><br><b>${dt(logs[0].changed_at)}</b></div><button id="hist" class="btn primary small">History</button></div>`:'<p class="hint detail-center">No status history yet.</p>'}`;$("occ").onclick=quickOcc;$("ava").onclick=quickAva;$("ref").onclick=loadData;$("save").onclick=detailed;$("uploadBtn").onclick=()=>$("photoInput").click();$("photoInput").onchange=uploadPhoto;document.querySelectorAll(".del").forEach(b=>b.onclick=()=>deletePhoto(photos.find(x=>String(x.id)===String(b.dataset.id))));if($("hist"))$("hist").onclick=showHistory}
    function render(){renderSummary();computeNearest();renderList();renderNearest();renderDetail();renderMap()} function selectPin(id){s.selected=id||"";render()}
    async function loadData(){s.loading=true;renderList();const [a,b,c]=await Promise.all([db.from("pins").select("*").order("mooring_code",{ascending:true}),db.from("photos").select("*").order("created_at",{ascending:false}),db.from("status_logs").select("*").order("changed_at",{ascending:false})]);s.loading=false;if(a.error)alert("Failed to load moorings: "+a.error.message);else{s.pins=a.data||[];if(s.selected&&!s.pins.some(p=>p.id===s.selected))s.selected=""} if(b.error)alert("Failed to load photos: "+b.error.message);else s.photos=b.data||[]; if(c.error)alert("Failed to load status logs: "+c.error.message);else s.logs=c.data||[];render()}
    async function saveStatus(newStatus,vessel,note){const p=pin();if(!p)return false;const vv=newStatus==="available"?null:(vessel||null);let r=await db.from("pins").update({status:newStatus,current_vessel_name:vv,note:note||null,last_updated_at:new Date().toISOString()}).eq("id",p.id);if(r.error){alert("Failed to update status: "+r.error.message);return false} r=await db.from("status_logs").insert({pin_id:p.id,old_status:p.status||"available",new_status:newStatus,vessel_name:vv,note:note||null});if(r.error){alert("Failed to save status log: "+r.error.message);return false} await loadData();return true}
    function promptRequired(message,defaultValue=""){while(true){const value=prompt(message,defaultValue);if(value===null)return null;const trimmed=value.trim();if(trimmed)return trimmed;alert("This field is required. Please enter a value.");defaultValue=""}}
    async function quickOcc(){const v=promptRequired("Enter the vessel name currently using this mooring.","");if(v===null)return;const placedBy=promptRequired("Placed by (Initial)","");if(placedBy===null)return;if(await saveStatus("occupied",v,placedBy))alert("Marked as occupied.")}
    async function quickAva(){const removedBy=promptRequired("Removed by (Initial)","");if(removedBy===null)return;if(await saveStatus("available",null,removedBy))alert("Marked as available.")}
    async function detailed(){const st=$("editStatus").value;if(!st){alert("Please select a status before saving the detailed update.");return} if(await saveStatus(st,$("vessel").value.trim(),$("note").value.trim()))alert("Detailed update saved.")}
    async function uploadPhoto(e){const file=e.target.files&&e.target.files[0],p=pin();if(!file||!p)return;$("uploadMsg").textContent="Uploading...";const ext=file.name.split(".").pop(),name=`${p.id}/${Date.now()}.${ext}`;let r=await db.storage.from("pin-photos").upload(name,file);if(r.error){alert("Failed to upload photo: "+r.error.message);$("uploadMsg").textContent="";return}const url=db.storage.from("pin-photos").getPublicUrl(name).data.publicUrl;r=await db.from("photos").insert({pin_id:p.id,file_path:url});if(r.error){alert("Failed to save photo record: "+r.error.message);$("uploadMsg").textContent="";return}e.target.value="";await loadData()}
    async function deletePhoto(ph){if(!ph||!confirm("Delete this photo?"))return;const marker="/object/public/pin-photos/",idx=String(ph.file_path||"").indexOf(marker);if(idx!==-1)await db.storage.from("pin-photos").remove([String(ph.file_path).slice(idx+marker.length)]);const r=await db.from("photos").delete().eq("id",ph.id);if(r.error)alert("Failed to delete photo: "+r.error.message);else await loadData()}
    function locate(){if(!navigator.geolocation){$("locationMsg").textContent="Location services are not available on this device.";return}$("locateBtn").disabled=true;$("locateBtn").textContent="Getting location...";navigator.geolocation.getCurrentPosition(pos=>{s.user={lat:pos.coords.latitude,lng:pos.coords.longitude};$("locateBtn").disabled=false;$("locateBtn").textContent="Use my current location";render()},err=>{const m={1:"Location permission was denied.",2:"Unable to determine current location.",3:"Location request timed out."};$("locationMsg").textContent=m[err.code]||"Failed to get location.";$("locateBtn").disabled=false;$("locateBtn").textContent="Use my current location"},{enableHighAccuracy:true,timeout:10000,maximumAge:60000})}
    function historyHtml(x){return `<div class="history-item"><div class="hint">${dt(x.changed_at)}</div><b>${esc(x.old_status||"-")} → ${esc(x.new_status||"-")}</b><br>Vessel: ${esc(x.vessel_name||"None")}<br>Note: ${esc(x.note||"-")}</div>`}
    function showHistory(){const p=pin(),logs=pinLogs().slice(1);if(!p)return;$("historySub").textContent=`Previous status updates for ${p.mooring_code||"NO-CODE"} - ${p.title||"Untitled"}`;$("historyList").innerHTML=logs.length?logs.map(historyHtml).join(""):'<p class="hint">No previous status history yet.</p>';$("historyModal").style.display="flex"}
    $("refreshTop").onclick=loadData;$("locateBtn").onclick=locate;$("closeHistory").onclick=()=>$("historyModal").style.display="none";$("historyModal").onclick=e=>{if(e.target===$("historyModal"))$("historyModal").style.display="none"};initMap();loadData();
  </script>
</body>
</html>
